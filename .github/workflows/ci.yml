name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    name: test (py${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4

      - name: install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true

      - name: set up python
        run: uv python install ${{ matrix.python-version }}

      - name: install dependencies
        run: uv sync --extra dev

      - name: lint (ruff)
        run: uv run ruff check .

      - name: format check (ruff)
        run: uv run ruff format --check .

      - name: type check (mypy)
        run: uv run mypy lifegraph_kg

      - name: test (pytest)
        run: uv run pytest --cov=lifegraph_kg --cov-report=term-missing

  license-check:
    name: license compliance
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: verify LICENSE present
        run: test -f LICENSE && grep -q "Apache License" LICENSE

      - name: verify NOTICE present
        run: test -f NOTICE

  evals:
    name: evals (validate fixtures + run not-yet-implemented gate)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true

      - name: set up python
        run: uv python install 3.13

      - name: install dependencies
        run: uv sync --extra dev

      - name: validate fixtures
        # Confirms every fixture loads against its Pydantic schema.
        run: uv run python -m tests.eval.runners.run_all --validate-only

      - name: run eval gate
        # Until L1+ ships, this asserts every category returns
        # "not_yet_implemented" or "pass" (CI gate). Once a phase lands,
        # it must keep passing.
        run: uv run python -m tests.eval.runners.run_all
          --output tests/eval/reports/ci-${{ github.sha }}.json

      - name: upload report artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: eval-report-${{ github.sha }}
          path: tests/eval/reports/ci-${{ github.sha }}.json
          retention-days: 30
